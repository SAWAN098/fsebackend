name: "SAWAN Workflow"

on: push

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Create file
        run: echo "this is job 1" > job1.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: job1-artifact
          path: job1.txt

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: job1-artifact   # fixed

      - name: Read file
        run: cat job1.txt
