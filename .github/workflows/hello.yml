name : "SAWAN Workflow"
on : push
jobs :
    job1:
      runs-on: ubuntu-latest
      steps:
        - name : create file
          run : echo "this is job 1" > job1.txt 
          name : upload file
          uses : actions/upload-artifact@v4
          with :
            name : job1-artifact
            path : job1.txt
    job2:
      runs-on: ubuntu-latest
      needs : job1
      steps:
        - name : download artifact
          uses : actions/download-artifact@v4
          with :
            name : job1-artifactd
        - name : read file.txt
          run : cat  job1.txt
